# V10 NEXUS Swarm — CI/CD
name: V10 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: bandit -r . -f json -o bandit-report.json || true
      - run: safety check --json --output safety-report.json || true
      - run: flake8 . --max-line-length=120 --exclude=migrations,venv,__pycache__
      - run: mypy . --ignore-missing-imports
      - run: pytest tests/test_crypto.py tests/test_risk_agent.py -v
        env:
          SECRET_KEY: test-secret-key-32-chars-long!!!
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          MASTER_KEY: test-master-key-64-hex-chars-long-1234567890123456
